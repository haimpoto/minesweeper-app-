<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שולה המוקשים!!</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💣</text></svg>">

    <!-- קישור לקובץ העיצוב שלנו -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- פונט מודרני מבית Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- קופסת המשחק הראשית (Container) -->
    <div class="game-container">

        <!-- כותרת ראשית -->
        <header>
            <h1>שולה המוקשים 💣</h1>
        </header>

        <!-- סרגל בקרת המשחק: בחירת רמת קושי וכפתור התחלה -->
        <div class="controls">
            <div class="controls">
            <select id="difficulty-select">
                <option value="easy">קל</option>
                <option value="medium">בינוני</option>
                <option value="hard">קשה</option>
            </select>
            <button id="new-game-btn" onclick="startNewGame()">משחק חדש</button>

            <!-- מונה המוקשים החדש -->
            <div id="mines-counter" class="mines-counter">
                🚩 <span id="mines-count">10</span>
            </div>
        </div>
        </div>

        <!-- לוח המשחק - הגריד שיכיל את כל המשבצות -->
        <div id="board" class="board"></div>

        <!-- אזור הודעות סיום (ניצחון / הפסד) -->
        <div id="status-message" class="status-message"></div>

    </div>

<!-- קישור לקובץ ה-JavaScript -->
    <script src="/static/app.js"></script>

    <!-- שורת זכויות יוצרים -->
    <div class="copyright">
        © חיים פוטולסקי
    </div>
</body>
</html>
